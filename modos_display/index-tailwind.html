<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1>Inline: </h1>

    <div class="inline bg-pink-300 text-white">
        Productos
    </div>
    <div class="inline bg-sky-500 text-black">
        Nosotros
    </div>
    <div class="inline bg-emerald-400 text-white">
        Servicios
    </div>
    <div class="inline bg-cyan-600 text-black">
        Contacto
    </div>


    <hr />

    <h1>Block</h1>

    <div class="block bg-indigo-300 text-purple-700  w-[200px] h-[100px] ">
        Productos
    </div>
    <div class="block bg-blue-300 text-blue-700 w-[200px] h-[100px]">
        Nosotros
    </div>
    <div class="block bg-fuchsia-300 text-fuchsia-700 w-[200px] h-[100px]">
        Servicios
    </div>
    <div class="block bg-lime-300 w-[200px] h-[100px]">
        Contacto
    </div>
</body>
</html>
