<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .padre{
            width: 500px;
            height: 400px;
            background-color: violet;
            display: block;
        }

        .hijo{
            width: 200px;
            height: 200px;
            background-color: deepskyblue;
            display: block;
            padding: 20px 30px 5px 10px;
            border-top: 10px double rgb(255, 187, 0);
            border-right: 5px dashed rgb(153, 58, 231) ;
            border-bottom: 4px solid rgb(78, 231, 58) ;
            border-left: 7px solid rgb(38, 24, 235);
        }
    </style>
</head>
<body>
    <div class="padre">
        <div class="hijo">
            Hijo
        </div>
    </div>
    
</body>
</html>
